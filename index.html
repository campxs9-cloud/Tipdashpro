<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TipDash Pro | Panel</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:white; font-family:sans-serif; }
.blur-amount { filter: blur(12px); }
</style>
</head>

<body class="p-5" style="display:none;">

<h1 class="text-2xl mb-4">TipDash PRO</h1>
<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Cerrar sesión</button>

<hr class="my-6">

<!-- TU CONTENIDO AQUÍ (dejé ejemplo mínimo) -->
<p>Panel protegido funcionando correctamente.</p>

<!-- 🔐 FIREBASE PROTECTION -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxZirviEGMVRB0pzAR74wo3TOs37bp7Ww",
  authDomain: "tipdashpro.firebaseapp.com",
  projectId: "tipdashpro",
  storageBucket: "tipdashpro.firebasestorage.app",
  messagingSenderId: "205220829905",
  appId: "1:205220829905:web:d4bc371e87cc210f1643f0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user || !user.emailVerified) {
    window.location.href = "login.html";
  } else {
    document.body.style.display = "block";
  }
});

window.logout = function() {
  signOut(auth);
  window.location.href = "login.html";
}
</script>

</body>
</html>
